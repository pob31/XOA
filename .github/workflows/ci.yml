name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -S . -B build

      - name: Build (Debug)
        run: cmake --build build --config Debug --parallel

      - name: Test
        run: ctest --test-dir build -C Debug --output-on-failure

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug

      - name: Build (Debug)
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install JUCE build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config libasound2-dev \
              libfreetype6-dev libfontconfig1-dev libgl1-mesa-dev \
              libcurl4-openssl-dev libgtk-3-dev libwebkit2gtk-4.1-dev libudev-dev \
              libjack-jackd2-dev xvfb

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug

      - name: Build (Debug)
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      # WP9 OSC control-replay: drive the real app over OSC (headless via xvfb).
      # Linux-only gate — the app is a GUI app; Windows/macOS stay unit-test-only.
      - name: OSC control-replay
        run: xvfb-run -a python3 tools/validation/control-replay/osc_replay.py

      # WP10 GUI smoke (D33): launch the real GUI headless, cycle all tabs, flip
      # the theme, and quit 0. Debug asserts (incl. the per-tab registry-coverage
      # check) fail the step. Linux-only, same xvfb lane as the replay gate.
      - name: GUI smoke
        run: |
          XOA_BIN=$(find build -type f -name XOA -perm -u+x | head -1)
          echo "GUI smoke binary: $XOA_BIN"
          test -n "$XOA_BIN"
          xvfb-run -a "$XOA_BIN" --gui-smoke
